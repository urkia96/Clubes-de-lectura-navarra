name: Actualizador Selenium Nocturno

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Chrome y Selenium
        run: |
          pip install selenium pandas openpyxl requests beautifulsoup4
          
      - name: Ejecutar Scraper
        working-directory: ./recomendador
        run: python scraper_disponibilidad.py

      - name: Guardar Excel
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add recomendador/disponibilidad_catalogo_completo.xlsx
          git commit -m "Update Selenium: $(date +'%Y-%m-%d')" || exit 0
          git push

