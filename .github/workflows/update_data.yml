name: Actualizador de Disponibilidad

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repo
        uses: actions/checkout@v3

      - name: Configurar Python
        # Aqui estaba el error, ahora esta completo:
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerias
        run: |
          pip install requests pandas beautifulsoup4 openpyxl

      - name: Ejecutar Scraper
        working-directory: ./recomendador
        run: python scraper_disponibilidad.py

      - name: Guardar cambios en el Excel
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add recomendador/disponibilidad_catalogo_completo.xlsx
          git commit -m "Actualizacion automatica: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git pus
