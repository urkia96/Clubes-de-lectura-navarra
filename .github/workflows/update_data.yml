name: Actualizador de Disponibilidad

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: |
          pip install requests pandas beautifulsoup4 openpyxl lxm

      - name: Ejecutar Scraper
        # MUY IMPORTANTE: Esta linea le dice al robot que entre en la carpeta
        working-directory: ./recomendador 
        run: python scraper_disponibilidad.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add recomendador/disponibilidad_catalogo_completo.xlsx
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push
